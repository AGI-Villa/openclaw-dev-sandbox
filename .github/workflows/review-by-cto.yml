name: CTO Code Review

on:
  pull_request:
    types: [labeled]

jobs:
  cto-review:
    if: github.event.label.name == 'cto-review'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run CTO Review Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          /home/admin/.local/bin/agent -p --force --trust \
            --workspace /home/admin/openclaw-dev-sandbox \
            "[cursor-review] PR #${{ github.event.pull_request.number }}

PR URL: ${{ github.event.pull_request.html_url }}
Branch: ${{ github.event.pull_request.head.ref }}
Repo: AGI-Villa/openclaw-dev-sandbox

Follow instructions in skills/cursor-dev/SKILL.md"
